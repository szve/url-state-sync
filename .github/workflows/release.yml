name: Release

# 发布一个 GitHub Release 后触发,自动把 packages/core 发到 npm
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --config.trustPolicy=disabled

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm --filter url-state-sync typecheck

      - name: Test
        run: pnpm --filter url-state-sync test

      - name: Build
        run: pnpm --filter url-state-sync build

      # 不写包名,从 packages/core 的 package.json 读
      - name: Publish to npm
        working-directory: packages/core
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
